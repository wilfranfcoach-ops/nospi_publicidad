<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nospi - Impacto</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: black; color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-family: Arial, sans-serif; overflow: hidden;
        }

        #videoNospi {
            display: none; /* Se muestra solo al dar play */
            width: 100vw; height: auto; max-height: 85vh;
            object-fit: contain;
        }

        .gradiente-nospi {
            background: linear-gradient(90deg, #0045AD 0%, #00AEEF 50%, #7AC143 100%);
            border: none; color: white; text-decoration: none;
            font-weight: bold; box-shadow: 0px 4px 15px rgba(0, 174, 239, 0.3);
            display: flex; align-items: center; justify-content: center;
            gap: 10px; transition: transform 0.2s;
        }

        #capa-inicio {
            text-align: center; cursor: pointer; z-index: 2000;
        }

        .boton-play {
            padding: 18px 35px; border-radius: 50px;
            font-size: 1.1em; cursor: pointer;
        }

        #btn-whatsapp {
            display: none; /* Lo activa el script */
            padding: 12px 20px; border-radius: 50px;
            position: fixed; bottom: 10px; /* Bien abajo para no pisar el logo */
            z-index: 3000; width: 65%; max-width: 250px;
            font-size: 0.85em; text-align: center;
        }
    </style>
</head>
<body>

    <div id="capa-inicio" onclick="comenzarMagia()">
        <button class="boton-play gradiente-nospi">
            <span>🔊</span> TOCAR PARA VER CON AUDIO
        </button>
        <p style="margin-top: 15px; color: #888; font-size: 0.8em;">Activa la experiencia Nospi</p>
    </div>

    <video id="videoNospi" playsinline>
        <source src="video3.mp4" type="video/mp4">
    </video>

    <a href="https://wilfranfcoach-ops.github.io/nospi_publicidad/" id="btn-whatsapp" class="gradiente-nospi">
        <span>💬</span> ¡QUIERO ESTA MAGIA!
    </a>

    <script>

            const video = document.getElementById('videoNospi');
            const capa = document.getElementById('capa-inicio');
            const btn = document.getElementById('btn-whatsapp');

            video.style.display = 'block';
            video.play();
