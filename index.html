<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Nospi - La Magia del Cobro</title>
   <style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 80%;
        background-color: black; /* Fondo negro para que no se vea feo si sobra espacio */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    #videoNospi {
        width: 100vw;       /* Ocupa todo el ancho de la pantalla */
        height: auto;       /* Mantiene la proporción original para no recortar el logo */
        max-height: 80vh;   /* Deja espacio abajo para que el botón de WhatsApp no tape el logo */
        object-fit: contain; /* Asegura que el video se vea completo sin recortes */
    }
</style>
</head>
<body>

    <video id="videoNospi" autoplay muted playsinline>
        <source src="video3.mp4" type="video/mp4">
        Tu navegador no soporta videos.
    </video>

    <a href="https://wa.link/TU_CODIGO_AQUI" id="btn-whatsapp">
        ¡QUIERO ESTA MAGIA EN MI NEGOCIO! 🚀
    </a>

    <script>
        const video = document.getElementById('videoNospi');
        const btn = document.getElementById('btn-whatsapp');

        // Aparecer el botón cuando falte poco para terminar (segundo 15)
        video.ontimeupdate = function() {
            if (video.currentTime >= 15) {
                btn.style.display = 'block';
            }
        };
    </script>
</body>
</html>
