<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nospi - Impacto</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: black; color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-family: Arial, sans-serif; overflow: hidden;
        }

        #videoNospi {
            display: none; 
            width: 100vw; height: auto; max-height: 85vh;
            object-fit: contain;
        }

        .gradiente-nospi {
            background: linear-gradient(90deg, #0045AD 0%, #00AEEF 50%, #7AC143 100%);
            border: none; color: white; text-decoration: none;
            font-weight: bold; box-shadow: 0px 4px 15px rgba(0, 174, 239, 0.4);
            display: flex; align-items: center; justify-content: center;
            gap: 10px; transition: transform 0.2s;
            cursor: pointer; /* Indispensable para que sepa que es clickeable */
        }

        /* Pantalla de inicio mejorada */
        #capa-inicio {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background-color: rgba(0,0,0,0.8);
            z-index: 5000; /* Siempre arriba al inicio */
        }

        .boton-play {
            padding: 18px 35px; border-radius: 50px;
            font-size: 1.1em;
        }

        /* Botón de WhatsApp más pequeño y abajo */
        #btn-whatsapp {
            display: none; 
            padding: 10px 15px; border-radius: 50px;
            position: fixed; bottom: 10px; 
            z-index: 6000; /* Más arriba que el video */
            width: 60%; max-width: 220px;
            font-size: 0.8em; text-align: center;
        }
    </style>
</head>
<body>

    <div id="capa-inicio" onclick="comenzarMagia()">
        <button class="boton-play gradiente-nospi">
            <span>🔊</span> TOCAR PARA VER CON AUDIO
        </button>
        <p style="margin-top: 15px; color: #888; font-size: 0.8em;">Activa la experiencia Nospi</p>
    </div>

    <video id="videoNospi" playsinline>
        <source src="video3.mp4" type="video/mp4">
    </video>

    <a href="https://wa.link/1zx140" id="btn-whatsapp" class="gradiente-nospi">
        <span>💬</span> ¡QUIERO ESTA MAGIA!
    </a>

    <script>
        function comenzarMagia() {
            const video = document.getElementById('videoNospi');
            const capa = document.getElementById('capa-inicio');
            const btn = document.getElementById('btn-whatsapp');

            // 1. Desaparecer la capa por completo
            capa.style.pointerEvents = 'none'; // Deja de recibir clics
            capa.style.display = 'none';

            // 2. Mostrar video y sonar
            video.style.display = 'block';
            video.play().catch(error => console.log("Error al reproducir:", error));
            
            // 3. Cronómetro para el botón
            setTimeout(function() {
                btn.style.display = 'flex';
            }, 15000);
        }
    </script>
</body>
</html>
