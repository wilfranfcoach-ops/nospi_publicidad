<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Nospi - La Magia del Cobro</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: black; color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden;
        }

        #videoNospi {
            display: none;
            width: 100vw; height: auto; max-height: 80vh;
            object-fit: contain;
        }

        /* Degradado basado en tu Logo Nospi */
        .gradiente-nospi {
            background: linear-gradient(90deg, #0045AD 0%, #00AEEF 50%, #7AC143 100%);
            border: none;
            color: white;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0px 4px 15px rgba(0, 174, 239, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .gradiente-nospi:active {
            transform: scale(0.95);
        }

        /* Botón de Inicio */
        #capa-inicio {
            text-align: center;
            cursor: pointer;
        }

        .boton-play {
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
        }

        /* Botón de WhatsApp */
        #btn-whatsapp {
            display: none;
            padding: 15px 30px;
            border-radius: 50px;
            position: fixed;
            bottom: 30px;
            z-index: 1000;
            width: 80%;
            max-width: 350px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <div id="capa-inicio" onclick="comenzarMagia()">
        <button class="boton-play gradiente-nospi">
            <span>🔊</span> TOCAR PARA VER CON AUDIO
        </button>
        <p style="margin-top: 15px; color: #666; font-size: 0.9em;">Descubre la magia de Nospi</p>
    </div>

    <video id="videoNospi" playsinline>
        <source src="video3.mp4" type="video/mp4">
    </video>

    <a href="https://wa.me/573104113333?text=Hola%20Wilfran,%20quiero%20la%20magia%20de%20Nospi" id="btn-whatsapp" class="gradiente-nospi">
        <span>💬</span> ¡QUIERO ESTA MAGIA EN MI NEGOCIO!
    </a>

    <script>
        const video = document.getElementById('videoNospi');
        const capa = document.getElementById('capa-inicio');
        const btn = document.getElementById('btn-whatsapp');

        function comenzarMagia() {
            capa.style.display = 'none';
            video.style.display = 'block';
            video.play();
            
            // Aparece a los 15 segundos
            setTimeout(function() {
                btn.style.display = 'flex'; // Usamos flex para centrar contenido
            }, 15000);
        }
    </script>
    
</body>
</html>
